services:
  postgres:
    image: postgres:15-alpine
    container_name: optionthropic_postgres
    environment:
      POSTGRES_USER: optionthropic
      POSTGRES_PASSWORD: optionthropic_secret
      POSTGRES_DB: optionthropic
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optionthropic"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optionthropic_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://optionthropic:optionthropic_secret@postgres:5432/optionthropic
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: optionthropic_frontend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
